services:
  - type: web
    name: anqing-card-sync
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: APP_ID
        value: 19e20a70-b892-8b29-8000-0000e4162c09
      - key: APP_SECRET
        sync: false
      - key: KIMI_AUTH_URL
        value: https://auth.kimi.com
      - key: KIMI_OPEN_URL
        value: https://open.kimi.com
      - key: VITE_APP_ID
        value: 19e20a70-b892-8b29-8000-0000e4162c09
      - key: VITE_KIMI_AUTH_URL
        value: https://auth.kimi.com
