version: '3.8'

services:
  # ===== MySQL 数据库 =====
  mysql:
    image: mysql:8.0
    container_name: anqing-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Anqing@2026
      MYSQL_DATABASE: anqing_card
      MYSQL_USER: anqing
      MYSQL_PASSWORD: Anqing@2026
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ===== 后端应用 =====
  app:
    build: .
    container_name: anqing-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://anqing:Anqing@2026@mysql:3306/anqing_card
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npm run db:push && npm start"

  # ===== Nginx 反向代理（可选，用于域名和SSL） =====
  nginx:
    image: nginx:alpine
    container_name: anqing-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  mysql-data:
